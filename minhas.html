<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login / Cadastro - Biblioteca Solidária</title>
  <link rel="stylesheet" href="css/login.css"/>
</head>
<body>
  <header>
    <nav>
      <a href="index.html">Início</a>
    </nav>
  </header>
  
  <main>
    <div class="form-container">
      <h2>Login</h2>
      <form id="form-login" aria-label="Formulário de Login">
        <input type="email" name="email" placeholder="E-mail" required aria-required="true" />
        <input type="password" name="senha" placeholder="Senha" required aria-required="true" />
        <button type="submit">Entrar</button>
      </form>

      <h2>Cadastro</h2>
      <form id="form-cadastro" aria-label="Formulário de Cadastro">
        <input type="text" name="nome" placeholder="Nome completo" required aria-required="true" />
        <input type="email" name="email" placeholder="E-mail" required aria-required="true" />
        <input type="password" name="senha" placeholder="Senha" required aria-required="true" />
        <input type="text" name="endereco" placeholder="Endereço" required aria-required="true" />
        <input type="text" name="numero" placeholder="Número" required aria-required="true" />
        <input type="text" name="cidade" placeholder="Cidade" required aria-required="true" />
        <input type="text" name="cep" placeholder="CEP" required aria-required="true" />
        <button type="submit">Cadastrar</button>
      </form>
    </div>
  </main>
</body>
</html>
